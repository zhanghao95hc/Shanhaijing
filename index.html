<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>山海异兽录</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23151411'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-size='34' fill='%23faf4e5'%3E山%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css?v=20260531e" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="#" aria-label="山海异兽录首页">
          <span class="brand-mark">山</span>
          <span>山海异兽录</span>
        </a>
        <nav class="creature-menu" aria-label="异兽选择">
          <button class="menu-item" type="button" data-creature="jiuweihu">九尾狐</button>
          <button class="menu-item" type="button" data-creature="zheng">狰</button>
          <button class="menu-item" type="button" data-creature="paoxiao">狍鸮</button>
          <button class="menu-item" type="button" data-creature="lushu">鹿蜀</button>
          <button class="menu-item" type="button" data-creature="xuangui">旋龟</button>
          <button class="menu-item" type="button" data-creature="bifang">毕方</button>
          <button class="menu-item" type="button" data-creature="dijiang">帝江</button>
          <button class="menu-item" type="button" data-creature="dangkang">当康</button>
          <button class="menu-item" type="button" data-creature="qiongqi">穷奇</button>
          <button class="menu-item" type="button" data-creature="gudiao">蛊雕</button>
        </nav>
      </header>

      <main>
        <section class="hero" aria-labelledby="creature-name">
          <div class="hero-copy">
            <p class="source" id="creature-source"></p>
            <h1 id="creature-name"></h1>
            <p class="summary" id="creature-summary"></p>
            <dl class="quick-facts" id="quick-facts"></dl>
          </div>

          <figure class="image-stage">
            <img id="creature-image" src="" alt="" />
            <figcaption id="creature-caption"></figcaption>
          </figure>
        </section>

        <section class="content-grid">
          <article class="text-panel original-panel">
            <h2>山海经原文</h2>
            <blockquote id="original-text"></blockquote>
          </article>

          <article class="text-panel">
            <h2>原文解释</h2>
            <p id="interpretation"></p>
          </article>

          <article class="text-panel">
            <h2>形象依据</h2>
            <ul class="feature-list" id="feature-list"></ul>
          </article>
        </section>

      </main>
    </div>

    <script defer src="script.js?v=20260601a"></script>
  </body>
</html>
